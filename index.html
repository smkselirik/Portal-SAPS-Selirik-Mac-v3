<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Markah Peperiksaan - SMK Selirik</title>
    <style>
        /* CSS Styling */
        :root {
            --night-blue: #151B54;
            --gold: #D4AF37;
            --light-blue-1: #c2e9fb;
            --light-blue-2: #a1c4fd;
            --white: #ffffff;
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, var(--light-blue-2), var(--light-blue-1));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header with purely Night Blue and elegant abstract golden pattern */
        header {
            background-color: var(--royal-blue);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.2) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.05) 0%, rgba(212, 175, 55, 0.05) 2px, transparent 2px, transparent 15px);
            color: var(--white);
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-bottom: 4px solid var(--gold);
            position: relative;

        }

        header img {
            width: 100px;
            height: auto;
        }

        header h1 {
            margin: 10px 0 5px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
        }

        header h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 300;
        }

        .container {
            flex: 1;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: none; /* Hidden by default */
        }

        .card.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--night-blue);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary { background: var(--night-blue); color: var(--gold); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: #333; }
        
        .student-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .student-row:last-child { border-bottom: none; }

        .student-name {
            font-weight: 600;
            font-size: 14px;
            word-break: break-word;
        }

        .mark-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 16px;
        }

        .grade-indicator {
            font-weight: bold;
            text-align: center;
            color: var(--night-blue);
            background: #f0f0f0;
            padding: 8px;
            border-radius: 4px;
        }

        .th-btn {
            background: var(--danger);
            color: white;
            padding: 8px;
            font-size: 12px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        /* Dashboard Styles */
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 8px;
            text-align: center;
            font-size: 14px;
        }
        th { background-color: var(--night-blue); color: white; }

        footer {
            background: var(--night-blue);
            color: var(--white);
            text-align: center;
            padding: 15px;
            font-size: 14px;
            margin-top: auto;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .student-row {
                grid-template-columns: 1fr;
                gap: 5px;
                background: #f9f9f9;
                border-radius: 8px;
                margin-bottom: 10px;
                padding: 15px;
                border: 1px solid #ddd;
            }
            .grid-inputs {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 10px;
            }
        }
        
        .loader {
            text-align: center;
            font-weight: bold;
            color: var(--night-blue);
            display: none;
            margin: 10px 0;
        }
    </style>
</head>

    <div class="container">
        <div id="login-section" class="card active">
            <h3 style="color: var(--night-blue); text-align: center;">Log Masuk Guru</h3>
            <div class="form-group">
                <label>No. Kad Pengenalan / ID</label>
                <input type="text" id="teacher-id" placeholder="Masukkan ID (Tanpa sengkang)">
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="login()">Log Masuk</button>
        </div>

        <div id="selection-section" class="card">
            <h3 id="welcome-msg" style="color: var(--night-blue);"></h3>
            <div class="form-group">
                <label>Pilih Subjek & Kelas</label>
                <select id="subject-class-select"></select>
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="loadStudents()">Seterusnya</button>
            <div class="action-buttons">
                <button class="btn-warning" onclick="showDashboard()">Semak Rekod</button>
                <button class="btn-danger" onclick="logout()">Keluar</button>
            </div>
        </div>

        <div id="entry-section" class="card">
            <h3 id="current-class-title" style="color: var(--night-blue); border-bottom: 2px solid var(--gold); padding-bottom: 10px;"></h3>
            <div class="loader" id="loading-students">Sedang memuat turun data pelajar...</div>
            <div id="student-list"></div>
            
            <div class="action-buttons">
                <button class="btn-warning" onclick="goBack('selection-section')">Kembali</button>
                <button class="btn-success" onclick="saveAndSend()">Simpan & Hantar</button>
                <button class="btn-primary" onclick="showDashboard()">Semak Rekod</button>
                <button class="btn-danger" onclick="logout()">Keluar</button>
            </div>
        </div>

        <div id="dashboard-section" class="card">

                <table id="dashboard-table">

                            <th>Markah</th>
                            <th>Gred</th>
                            <th>Tindakan</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="action-buttons">
                <button class="btn-warning" onclick="goBackToPrevious()">Kembali</button>
                <button class="btn-danger" onclick="logout()">Keluar</button>
            </div>
        </div>
    </div>

    <footer>

        // Variables
        let currentTeacher = null;
        let selectedClassSub = "";
        let currentStudents = [];
        let prevSection = "login-section";

        // Utilities
        function showSection(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goBack(id) {
            showSection(id);
        }

        function goBackToPrevious() {
            showSection(prevSection);
        }

        // Logic Functions
        function login() {
            const id = document.getElementById('teacher-id').value.trim();
            if(TEACHERS[id]) {
                currentTeacher = TEACHERS[id];
                document.getElementById('welcome-msg').innerText = `Selamat Datang, ${currentTeacher.name}`;
                
                const select = document.getElementById('subject-class-select');
                select.innerHTML = "";
                currentTeacher.subjects.forEach(sub => {
                    let opt = document.createElement('option');
                    opt.value = sub;
                    opt.innerText = sub;
                    select.appendChild(opt);
                });
                
                showSection('selection-section');
            } else {
                alert("ID tidak dijumpai. Sila pastikan anda memasukkan ID yang betul.");
            }
        }

        function logout() {
            currentTeacher = null;
            document.getElementById('teacher-id').value = "";
            showSection('login-section');
        }

        async function loadStudents() {
            selectedClassSub = document.getElementById('subject-class-select').value;
            document.getElementById('current-class-title').innerText = selectedClassSub;
            
            // Extract Form level and Class Name
            let match = selectedClassSub.match(/([1-5])[A-Z0-9]+/);
            if(!match) { alert("Format kelas tidak dapat dikesan."); return; }
            
            let formLevel = match[1];
            let className = match[0];
            let subjectName = selectedClassSub.replace(className, "").trim();

            showSection('entry-section');
            document.getElementById('loading-students').style.display = "block";
            document.getElementById('student-list').innerHTML = "";

            try {
                const response = await fetch(CSV_LINKS[formLevel]);
                const text = await response.text();
                parseCSVAndRender(text, className, formLevel, subjectName);
            } catch (err) {
                alert("Ralat memuat turun data pelajar: " + err.message);
            } finally {
                document.getElementById('loading-students').style.display = "none";
            }
        }

        function parseCSVAndRender(csv, targetClass, formLevel, subjectName) {
            const rows = csv.split('\n');
            currentStudents = [];
            
            // Assumes Column C (index 2) is Name, Column D (index 3) is Class based on "MASTER" sheet logic
            for(let i=1; i<rows.length; i++) {
                let cols = rows[i].split(',');
                if(cols.length >= 4) {
                    let name = cols[2].replace(/"/g, '').trim();
                    let kelas = cols[3].replace(/"/g, '').trim();
                    
                    if(kelas === targetClass) {
                        currentStudents.push({name: name, mark: '', grade: ''});
                    }
                }
            }

            if(currentStudents.length === 0) {
                document.getElementById('student-list').innerHTML = "<p style='text-align:center;'>Tiada pelajar dijumpai untuk kelas ini.</p>";
                return;
            }

            renderStudentList(formLevel);
        }

        function renderStudentList(formLevel) {
            const listDiv = document.getElementById('student-list');
            listDiv.innerHTML = "";

            currentStudents.forEach((stud, index) => {
                const row = document.createElement('div');
                row.className = "student-row";
                
                const nameDiv = document.createElement('div');
                nameDiv.className = "student-name";
                nameDiv.innerText = `${index + 1}. ${stud.name}`;

                const inputsDiv = document.createElement('div');
                inputsDiv.className = "grid-inputs";
                inputsDiv.style.display = "contents";

                const markInput = document.createElement('input');
                markInput.type = "text";
                markInput.className = "mark-input";
                markInput.placeholder = "Markah";
                markInput.dataset.index = index;
                
                // Get existing data from localstorage if any
                let saved = getFromLocalStorage(stud.name, selectedClassSub);
                if(saved) {
                    markInput.value = saved.mark;
                    stud.mark = saved.mark;
                    stud.grade = saved.grade;
                }

                const gradeDiv = document.createElement('div');
                gradeDiv.className = "grade-indicator";
                gradeDiv.id = `grade-${index}`;
                gradeDiv.innerText = stud.grade || "-";

                // Auto calculate grade on input
                markInput.addEventListener('input', function(e) {
                    let val = this.value.toUpperCase();
                    if(val === 'TH') {
                        stud.mark = 'TH';
                        stud.grade = 'TH';
                    } else if (!isNaN(val) && val !== '') {
                        stud.mark = val;
                        stud.grade = calculateGrade(val, formLevel);
                    } else {
                        stud.mark = '';
                        stud.grade = '-';
                    }
                    gradeDiv.innerText = stud.grade;
                });

                // Enter Key Jump Next
                markInput.addEventListener('keydown', function(e) {
                    if(e.key === 'Enter') {
                        e.preventDefault();
                        let nextInput = document.querySelector(`input[data-index="${index + 1}"]`);
                        if(nextInput) nextInput.focus();
                    }
                });

                const thBtn = document.createElement('button');
                thBtn.className = "th-btn";
                thBtn.innerText = "TH";
                thBtn.onclick = function() {
                    markInput.value = 'TH';
                    stud.mark = 'TH';
                    stud.grade = 'TH';
                    gradeDiv.innerText = 'TH';
                };

                if (window.innerWidth <= 600) {
                    let mobileGroup = document.createElement('div');
                    mobileGroup.className = "grid-inputs";
                    mobileGroup.appendChild(markInput);
                    mobileGroup.appendChild(gradeDiv);
                    mobileGroup.appendChild(thBtn);
                    row.appendChild(nameDiv);
                    row.appendChild(mobileGroup);
                } else {
                    row.appendChild(nameDiv);
                    row.appendChild(markInput);
                    row.appendChild(gradeDiv);
                    row.appendChild(thBtn);
                }
                
                listDiv.appendChild(row);
            });
        }

        function calculateGrade(markStr, formLevel) {
            let mark = parseFloat(markStr);
            if(formLevel == 4 || formLevel == 5) {
                if(mark >= 90) return 'A+';
                if(mark >= 80) return 'A';
                if(mark >= 70) return 'A-';
                if(mark >= 65) return 'B+';
                if(mark >= 60) return 'B';
                if(mark >= 55) return 'C+';
                if(mark >= 50) return 'C';
                if(mark >= 45) return 'D';
                if(mark >= 40) return 'E';
                return 'G';
            } else {
                if(mark >= 82) return 'A';
                if(mark >= 66) return 'B';
                if(mark >= 50) return 'C';
                if(mark >= 35) return 'D';
                if(mark >= 20) return 'E';
                return 'F';
            }
        }

        // Local Storage & Dashboard Functions
        function getFromLocalStorage(name, classSub) {
            let data = JSON.parse(localStorage.getItem('portal_markah_smkselirik')) || [];
            return data.find(d => d.name === name && d.classSub === classSub);
        }

        function saveToLocalStorage(records) {
            let data = JSON.parse(localStorage.getItem('portal_markah_smkselirik')) || [];
            records.forEach(r => {
                let idx = data.findIndex(d => d.name === r.name && d.classSub === r.classSub);
                if(idx > -1) {
                    data[idx] = r;
                } else {
                    data.push(r);
                }
            });
            localStorage.setItem('portal_markah_smkselirik', JSON.stringify(data));
        }

        function showDashboard() {
            prevSection = document.querySelector('.card.active').id;
            let data = JSON.parse(localStorage.getItem('portal_markah_smkselirik')) || [];
            const tbody = document.querySelector('#dashboard-table tbody');
            tbody.innerHTML = "";

            if(data.length === 0) {
                tbody.innerHTML = "<tr><td colspan='6'>Tiada rekod dijumpai.</td></tr>";
            } else {
                // Filter data to only show for current logged in teacher's subjects
                let teacherSubs = currentTeacher ? currentTeacher.subjects : [];
                data.filter(d => teacherSubs.includes(d.classSub)).forEach((r, idx) => {
                    let tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${r.name}</td>
                        <td>${r.classSub.split(' ').pop()}</td>
                        <td>${r.classSub.replace(r.classSub.split(' ').pop(), '')}</td>
                        <td>${r.mark}</td>
                        <td>${r.grade}</td>
                        <td>
                            <button class="btn-danger" style="padding: 5px; font-size:12px;" onclick="deleteRecord('${r.name}', '${r.classSub}')">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            showSection('dashboard-section');
        }

        function deleteRecord(name, classSub) {
            if(confirm(`Adakah anda pasti untuk menghapus rekod ${name}?`)) {
                let data = JSON.parse(localStorage.getItem('portal_markah_smkselirik')) || [];
                data = data.filter(d => !(d.name === name && d.classSub === classSub));
                localStorage.setItem('portal_markah_smkselirik', JSON.stringify(data));
                
                // Note: Implementasi Hapus ke Google Sheet memerlukan Google Apps Script endpoint DELETE.
                // Untuk simulasi ini kita hapuskan dari local storage
                showDashboard();
                alert('Rekod dihapus dari local storage.');
            }
        }

        // Simpan & Hantar ke Pangkalan Data
        async function saveAndSend() {
            let match = selectedClassSub.match(/([1-5])[A-Z0-9]+/);
            let formLevel = match[1];
            let className = match[0];
            let subjectName = selectedClassSub.replace(className, "").trim();

            let targetCol = formLevel > 3 ? COL_MAP_F45[subjectName] : COL_MAP_F13[subjectName];
            
            if(!targetCol) {
                alert("Ralat: Kolum untuk subjek tidak ditemui dalam konfigurasi.");
                return;
            }

            // Get Grade column (usually the character after the target column, simple ascii manipulation)
            let gradeCol = getNextColumn(targetCol);

            let recordsToSave = [];
            let payloadData = [];

            currentStudents.forEach(s => {
                if(s.mark !== '') {
                    recordsToSave.push({
                        name: s.name,
                        mark: s.mark,
                        grade: s.grade,
                        classSub: selectedClassSub
                    });
                    
                    payloadData.push({
                        name: s.name,
                        mark: s.mark,
                        grade: s.grade
                    });
                }
            });

            if(recordsToSave.length === 0) {
                alert("Sila masukkan sekurang-kurangnya satu markah sebelum simpan.");
                return;
            }

            // 1. Save to LocalStorage
            saveToLocalStorage(recordsToSave);
            
            // 2. Send to Google Apps Script
            const scriptURL = APPS_SCRIPT_LINKS[formLevel];
            let payload = {
                action: "updateMarks",
                className: className,
                markCol: targetCol,
                gradeCol: gradeCol,
                data: JSON.stringify(payloadData)
            };

            // Convert to URL params to send as POST with no-cors or JSON 
            // In typical GAS forms, URLSearchParams works best
            let formBody = [];
            for (let property in payload) {
                let encodedKey = encodeURIComponent(property);
                let encodedValue = encodeURIComponent(payload[property]);
                formBody.push(encodedKey + "=" + encodedValue);
            }
            formBody = formBody.join("&");

            try {
                // Notis: Menggunakan mode 'no-cors' memandangkan polisi CORS pada GAS Web Apps
                fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formBody
                });
                alert("Data telah berjaya disimpan dan dihantar ke pangkalan data!");
                showDashboard();
            } catch (err) {
                alert("Data disimpan ke local storage, tetapi gagal dihantar ke Server: " + err.message);
            }
        }

        function getNextColumn(colStr) {
            let lastChar = colStr.slice(-1);
            let prefix = colStr.slice(0, -1);
            if (lastChar === 'Z') {
                return prefix ? prefix + 'A' : 'AA'; // Simple logic untuk next column jika ia Z
            }
            return prefix + String.fromCharCode(lastChar.charCodeAt(0) + 1);
        }

    </script>
